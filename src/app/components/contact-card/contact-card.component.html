<div class="contact-card">
  <div class="card-inner">
    <h2 class="card-title">Contact Agent</h2>
    <p class="card-support">
      Need help or have questions? Our support team is here for you via WhatsApp Business.
    </p>
    <a [href]="whatsappLink" target="_blank" rel="noopener noreferrer" class="btn-whatsapp">
      <span class="whatsapp-icon">WhatsApp</span>
      Chat on WhatsApp
    </a>
  </div>
</div>
