<div class="contact-layout">
  <section class="contact-info">
    <h2 class="card-title">Get in Touch</h2>
    <p class="card-support">
      Have questions about TalkyMate, payments, or your account? Reach out to us using the details below.
    </p>

    <div class="info-items">
      <div class="info-item">
        <span class="info-label">Email ID</span>
        <a [href]="'mailto:' + site.email" class="info-value">{{ site.email }}</a>
      </div>
      <div class="info-item">
        <span class="info-label">Support Email</span>
        <a [href]="'mailto:' + site.supportEmail" class="info-value">{{ site.supportEmail }}</a>
      </div>
    </div>
  </section>
</div>
